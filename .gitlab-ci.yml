image: python:3.11

stages:
  - setup
  - format
  - lint
  - security
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python -m venv .venv
  - source .venv/bin/activate
  - python -m pip install pip
  - pip install -r requirements.txt || true
  - pip install black ruff flake8 mypy bandit detect-secrets pytest pytest-cov

setup:
  stage: setup
  script:
    - python --version
    - pip --version

black:
  stage: format
  script:
    - black --check .

ruff:
  stage: lint
  script:
    - ruff check .

flake8:
  stage: lint
  script:
    - flake8 . || true

mypy:
  stage: lint
  script:
    - mypy . || true

bandit:
  stage: security
  script:
    - bandit -r . || true

detect-secrets:
  stage: security
  script:
    - detect-secrets scan . || true

pytest:
  stage: test
  script:
    - pytest || true

coverage:
  stage: test
  script:
    - pytest --cov=. || true

pip-check:
  stage: report
  script:
    - pip list

project-tree:
  stage: report
  script:
    - ls -R