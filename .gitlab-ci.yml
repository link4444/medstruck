image: python:3.11

stages:
  - setup
  - code-quality
  - type-check
  - security
  - testing
  - metadata

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

before_script:
  - python -m pip install --upgrade pip

# --- SETUP STAGE ---
# 1. Pre-commit Hooks Execution
pre_commit_run:
  stage: setup
  script:
    - pip install pre-commit
    - pre-commit run --all-files || echo "Pre-commit passed or generated warnings"

# --- CODE QUALITY STAGE ---
# 2. Black Formatting
black_check:
  stage: code-quality
  script:
    - pip install black
    - black --check .

# 3. ISort Import Sorting
isort_check:
  stage: code-quality
  script:
    - pip install isort
    - isort --check-only .

# 4. Ruff Linting
ruff_lint:
  stage: code-quality
  script:
    - pip install ruff
    - ruff check .

# 5. Yaml Lint
yamllint_check:
  stage: code-quality
  script:
    - pip install yamllint
    - yamllint .gitlab-ci.yml .pre-commit-config.yaml || true

# --- TYPE CHECK STAGE ---
# 6. MyPy Type Checking
mypy_check:
  stage: type-check
  script:
    - pip install mypy pydantic streamlit PyMuPDF altair pandas
    - mypy medstruct_ai/ || echo "MyPy check finished with soft fail"

# --- SECURITY STAGE ---
# 7. Bandit Security Scan
bandit_scan:
  stage: security
  script:
    - pip install bandit
    - bandit -r medstruct_ai/ -ll -ii || echo "Bandit soft fail"

# 8. Safety Dependency Scan
safety_scan:
  stage: security
  script:
    - pip install safety
    - safety check -r requirements.txt || echo "Safety soft fail"

# --- TESTING STAGE ---
# 9. Pytest Unit Tests
pytest_run:
  stage: testing
  script:
    - pip install pytest
    - echo "Running tests..."
    - pytest tests/ || echo "No tests found or pytest soft fail"

# --- METADATA STAGE ---
# 10. Semantic Commits Check
commit_lint:
  stage: metadata
  image: node:18
  before_script:
    - npm install -g @commitlint/cli @commitlint/config-conventional
    - echo "module.exports = {extends:['@commitlint/config-conventional']}" > commitlint.config.js
  script:
    - npx commitlint --from HEAD~1 --to HEAD || echo "Semantic commit check soft fail"
